<style>
:root{--red:#b71c1c;--dark-red:#7f0000;--gold:#f9a825;--cream:#fff8f0;--dark:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:var(--cream)}
nav{background:var(--dark);position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:15px 20px}
.logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.3rem;font-weight:900}
.nav-links{display:flex;gap:15px;list-style:none}
.nav-links a{color:#fff;text-decoration:none;font-size:0.85rem;text-transform:uppercase;transition:color 0.3s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.page{display:none}.page.active{display:block}
.hero{background:linear-gradient(135deg,var(--dark-red),var(--red));min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px}
.hero-emoji{font-size:5rem;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,8vw,4rem);color:#fff;font-weight:900;margin:15px 0 10px}
.hero p{color:rgba(255,255,255,0.85);font-size:1rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:30px}
.hero-btns{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.btn{padding:12px 30px;border:none;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.3s;text-transform:uppercase}
.btn-gold{background:var(--gold);color:var(--dark)}.btn-gold:hover{background:#ffca28;transform:translateY(-3px)}
.btn-outline{background:transparent;color:#fff;border:2px solid #fff}.btn-outline:hover{background:#fff;color:var(--dark)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;padding:40px 20px;background:#fff}
.feature-card{text-align:center;padding:25px 15px;border-radius:15px;background:var(--cream)}
.feature-card .icon{font-size:2.5rem;margin-bottom:10px}
.feature-card h3{font-family:'Playfair Display',serif;color:var(--red);margin-bottom:8px;font-size:1rem}
.feature-card p{color:#666;font-size:0.85rem;line-height:1.5}
.special{padding:50px 20px;text-align:center;background:var(--dark)}
.special h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:2rem;margin-bottom:30px}
.special-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:800px;margin:0 auto}
.special-card{background:#2a2a2a;border-radius:15px;overflow:hidden}
.special-img{font-size:3.5rem;background:linear-gradient(135deg,var(--dark-red),var(--red));padding:25px;text-align:center}
.special-info{padding:15px}
.special-info h3{color:#fff;font-family:'Playfair Display',serif;margin-bottom:5px}
.special-info p{color:#aaa;font-size:0.85rem;margin-bottom:10px}
.price{color:var(--gold);font-size:1.2rem;font-weight:700}
.page-header{background:linear-gradient(135deg,var(--dark-red),var(--red));padding:50px 20px;text-align:center}
.page-header h1{font-family:'Playfair Display',serif;color:#fff;font-size:clamp(1.8rem,6vw,3rem)}
.page-header p{color:rgba(255,255,255,0.8);margin-top:8px;letter-spacing:2px}

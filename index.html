<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Restaurant</title>
    <style>
        :root{--red:#b71c1c;--dark-red:#7f0000;--gold:#f9a825;--cream:#fff8f0;--dark:#1a1a1a}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--dark)}
        nav{background:var(--dark);padding:20px;color:white;text-align:center;position:sticky;top:0;z-index:100}
        .hero{background:linear-gradient(135deg,var(--dark-red),var(--red));min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;padding:20px}
        .hero h1{font-size:3.5rem;margin-bottom:10px}
        .btn{padding:12px 30px;background:var(--gold);color:var(--dark);text-decoration:none;font-weight:bold;border-radius:5px;margin-top:20px}
        .menu-section{padding:50px 20px;text-align:center}
        .footer{background:var(--dark);color:white;padding:20px;text-align:center}
    </style>
</head>
<body>

    <nav>
        <h2>Delicious Restaurant</h2>
    </nav>

    <div class="hero">
        <h1>Welcome to Our Kitchen</h1>
        <p>Swadisht khana, behtareen mahool.</p>
        <a href="#" class="btn">Order Now</a>
    </div>

    <div class="menu-section">
        <h2>Hamara Menu</h2>
        <p>Yahan aapko milega sabse lajawab swad.</p>
    </div>

    <div class="footer">
        <p>&copy; 2026 Delicious Restaurant. All rights reserved.</p>
    </div>

</body>
</html>
